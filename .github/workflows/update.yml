name: 📊 한국장 테이블 일일 업데이트

on:
  schedule:
    # 한국 장 마감 후 실행: 매일 오전 7시 UTC = 오후 4시 KST (장 마감 30분 후)
    - cron: '30 7 * * 1-5'   # 월~금만

  # 수동으로도 실행 가능
  workflow_dispatch:

permissions:
  contents: write   # index.html 커밋을 위해 필요

jobs:
  update-table:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🔄 데이터 수집 및 HTML 생성
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python generate.py

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "변경 없음 — 스킵" || \
            git commit -m "📊 테이블 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
