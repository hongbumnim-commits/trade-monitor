<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>한국 주요 종목 추적 (기준일: 2020.01.02)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
      color: #fff;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .updated {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 1.5rem;
    }
    .table-wrap {
      overflow-x: auto;
      width: 100%;
      max-width: 680px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    thead tr {
      background: #0f3460;
    }
    th {
      padding: 12px 16px;
      font-size: 0.78rem;
      color: #a0b4d0;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child { text-align: left; }
    td {
      padding: 10px 16px;
      font-size: 0.88rem;
      border-bottom: 1px solid #1e2d4a;
    }
    tr:last-child td { border-bottom: none; }
    td.name {
      font-weight: 700;
      color: #fff;
      text-align: left;
      display: flex;
      flex-direction: column;
    }
    td.name .ticker {
      font-size: 0.7rem;
      font-weight: 400;
      color: #667;
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* 행 배경 */
    tr.row-yellow td  { background: rgba(255, 230, 0, 0.18); }
    tr.row-green  td  { background: rgba(80, 200, 100, 0.15); }
    tr.row-pink   td  { background: rgba(230, 100, 100, 0.13); }

    /* 개별 셀 */
    td.cell-yellow { color: #ffe600; font-weight: 700; }
    td.cell-green  { color: #50c864; font-weight: 600; }
    td.cell-pink   { color: #ff7070; }

    .legend {
      margin-top: 1.2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      font-size: 0.72rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }
    .dot-y { background: rgba(255,230,0,0.6); }
    .dot-g { background: rgba(80,200,100,0.5); }
    .dot-p { background: rgba(230,100,100,0.45); }
  </style>
</head>
<body>
  <h1>🇰🇷 한국 주요 종목 추적</h1>
  <div class="subtitle">기준일: 2020.01.02 종가 기준</div>
  <div class="updated">마지막 업데이트: 2026-05-01 04:39 (KST)</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>종목</th>
          <th>거래대금 증가</th>
          <th>수익률</th>
          <th>수익률 − 시총증가</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-y"></div>수익률 ≥ 300%</div>
    <div class="legend-item"><div class="dot dot-g"></div>수익률 ≥ 120%</div>
    <div class="legend-item"><div class="dot dot-p"></div>수익률 &lt; 40%</div>
  </div>
</body>
</html>
